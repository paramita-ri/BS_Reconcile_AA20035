name: Build Windows Executable

on:
  push:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller
        pip check

    - name: Debug - List files
      run: Get-ChildItem -Recurse

    - name: Build executable
      run: |
        pyinstaller Script/Main.py --onefile --noconsole --name ReconcileApp
        if not exist dist\ReconcileApp.exe (
            echo "Build failed: dist\ReconcileApp.exe not found" && exit 1
        )

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReconcileApp.exe
        path: dist/ReconcileApp.exe  # Make sure this matches your actual path

    - name: Verify executable
      run: Test-Path dist/ReconcileApp.exe