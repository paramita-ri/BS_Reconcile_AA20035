name: Build MacOS Application

on:
  push:
    branches:
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip check

    - name: Build macOS executable
      run: |
        pyinstaller Script/Main.py \
          --onefile \
          --name ReconcileApp \
          --windowed \
          --osx-bundle-identifier "com.yourcompany.reconcileapp" \
          --log-level DEBUG
        
        # Verify the build
        if [ ! -f "dist/ReconcileApp" ]; then
          echo "Build failed: dist/ReconcileApp not found"
          find . -name "ReconcileApp*"
          exit 1
        fi

    - name: Create DMG package
      run: |
        brew install create-dmg
        mkdir -p pkgroot/Applications
        cp -r dist/ReconcileApp.app pkgroot/Applications/
        create-dmg \
          --volname "ReconcileApp Installer" \
          --window-size 800 400 \
          --icon "ReconcileApp.app" 200 190 \
          --app-drop-link 600 190 \
          --no-internet-enable \
          "dist/ReconcileApp.dmg" \
          "pkgroot/"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MacOS_Build
        path: |
          dist/ReconcileApp
          dist/ReconcileApp.app
          dist/*.dmg